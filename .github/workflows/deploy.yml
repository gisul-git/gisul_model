name: Build and Deploy

on:
push:
branches:
- dev

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  # ✅ FIXED BACKEND BUILD
  - name: Build and push backend
    uses: docker/build-push-action@v5
    with:
      context: .                     # 🔥 changed from ./backend
      file: ./backend/Dockerfile     # 🔥 explicitly point to Dockerfile
      push: true
      tags: gisul/qwen-api:latest

  # Frontend stays same (assuming no shared assets)
  - name: Build and push frontend
    uses: docker/build-push-action@v5
    with:
      context: ./frontend
      push: true
      tags: gisul/qwen-frontend:latest
```

deploy:
needs: build
runs-on: self-hosted

```
steps:
  - uses: actions/checkout@v4

  - name: Login to Docker Hub
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    run: |
      echo "$DOCKERHUB_TOKEN" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin

  - name: Deploy containers
    run: |
      docker stop qwen-frontend qwen-model watchtower 2>/dev/null || true
      docker rm -f qwen-frontend qwen-model watchtower 2>/dev/null || true
      cd /mnt/c/Users/adity/documents/gisul/gisul_model
      docker compose pull
      docker compose up -d --remove-orphans
```
