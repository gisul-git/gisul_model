name: Build and Deploy

on:
push:
branches:
- dev

jobs:
build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Login to Docker Hub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Build and push backend
    uses: docker/build-push-action@v5
    with:
      context: .
      file: ./backend/Dockerfile
      push: true
      tags: gisul/qwen-api:latest

  - name: Build and push frontend
    uses: docker/build-push-action@v5
    with:
      context: ./frontend
      push: true
      tags: gisul/qwen-frontend:latest
```

deploy:
needs: build
runs-on: self-hosted

```
steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Login to Docker Hub
    run: |
      echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

  - name: Deploy containers
    run: |
      docker stop qwen-frontend qwen-model watchtower 2>/dev/null || true
      docker rm -f qwen-frontend qwen-model watchtower 2>/dev/null || true
      cd /mnt/c/Users/adity/documents/gisul/gisul_model
      docker compose pull
      docker compose up -d --remove-orphans
```
