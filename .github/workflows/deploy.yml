name: Deploy to Self-Hosted Runner

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Restart containers
        run: |
          cd ${{ github.workspace }}
          docker-compose down
          docker-compose pull
          docker-compose up -d

      - name: Verify containers running
        run: docker ps
