name: Deploy to Office Laptop

on:
  push:
    branches:
      - dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: gisul/qwen-api:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: gisul/qwen-frontend:latest

  deploy:
    runs-on: self-hosted
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull latest images
        run: |
          docker pull gisul/qwen-api:latest
          docker pull gisul/qwen-frontend:latest

      - name: Restart containers
        run: |
          docker-compose -f ${{ github.workspace }}/docker-compose.yml down
          docker-compose -f ${{ github.workspace }}/docker-compose.yml up -d

      - name: Verify containers running
        run: docker ps
