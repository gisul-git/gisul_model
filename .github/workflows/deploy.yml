name: Build and Deploy

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest   # ✅ build in GitHub (no local load)

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: gisul/qwen-api:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: gisul/qwen-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted   # ✅ deploy on your machine

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login \
          --username "${{ secrets.DOCKERHUB_USERNAME }}" \
          --password-stdin

      - name: Deploy containers (Zero downtime)
        run: |
          cd /mnt/c/Users/aditya/documents/gisul/gisul_model

          docker compose pull
          docker compose up -d --remove-orphans