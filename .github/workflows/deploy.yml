name: Build and Deploy

on:
  push:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: gisul/qwen-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v3
      - name: Restart containers
        run: |
          docker stop qwen-model qwen-frontend || true
          docker rm qwen-model qwen-frontend || true
          docker-compose -f ${{ github.workspace }}/docker-compose.yml pull
          docker-compose -f ${{ github.workspace }}/docker-compose.yml up -d
